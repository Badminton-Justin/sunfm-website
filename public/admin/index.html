<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>SunFM Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      // Custom YouTube shortcode widget. The CMS shows a "YouTube" button in
      // the markdown editor; clicking it opens a form for ID + title and
      // inserts the <YouTube ... /> tag the MDX renderer expects.
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube",
        fields: [
          {
            name: "id",
            label: "Video ID (the part after v= in the YouTube URL)",
            widget: "string",
          },
          {
            name: "title",
            label: "Description (used as the accessibility label)",
            widget: "string",
          },
        ],
        pattern: /^<YouTube id="([^"]+)" title="([^"]+)" \/>$/,
        fromBlock: function (match) {
          return { id: match[1], title: match[2] };
        },
        toBlock: function (data) {
          return `<YouTube id="${data.id}" title="${data.title}" />`;
        },
        toPreview: function (data) {
          return `<div style="padding:1em;background:#f5f5f5;border-left:4px solid #FFD140;">YouTube embed: <strong>${data.title}</strong> (id: <code>${data.id}</code>)</div>`;
        },
      });
    </script>
  </body>
</html>
